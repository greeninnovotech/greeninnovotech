  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1435ea60-b9a9-4933-b674-b04862b6b905\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<title>Green Innovotech Solutions Pvt. Ltd.<\u002Ftitle>\n<meta name=\"description\" content=\"Solar Powered Waste Plastic Pyrolysis — Eco-sustainable innovation from Ludhiana, Punjab. Incubated at IIT Ropar TBIF.\">\n<script src=\"6f7c0c92-73c5-4a4c-b523-20f5e3eabc84\"><\u002Fscript>\n<style>\n  :root {\n    --green-dark:   #1B5E20;\n    --green-mid:    #2E7D32;\n    --green-main:   #388E3C;\n    --green-light:  #4CAF50;\n    --green-pale:   #C8E6C9;\n    --green-bg:     #F1F8F1;\n    --solar-dark:   #E65100;\n    --solar-mid:    #F57F17;\n    --solar-main:   #FFB300;\n    --solar-light:  #FFD54F;\n    --solar-pale:   #FFF8E1;\n    --white:        #FFFFFF;\n    --gray-50:      #FAFAFA;\n    --gray-100:     #F5F5F5;\n    --gray-200:     #EEEEEE;\n    --gray-300:     #E0E0E0;\n    --gray-600:     #757575;\n    --gray-800:     #424242;\n    --gray-900:     #212121;\n    --text-main:    #1A2E1A;\n    --text-body:    #3D5A3D;\n    --shadow-sm:    0 2px 8px rgba(46,125,50,0.10);\n    --shadow-md:    0 6px 24px rgba(46,125,50,0.14);\n    --shadow-lg:    0 16px 48px rgba(46,125,50,0.16);\n    --radius:       12px;\n    --radius-lg:    20px;\n    --transition:   0.35s cubic-bezier(0.4,0,0.2,1);\n  }\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; font-size: 16px; }\n  body {\n    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;\n    background: var(--white);\n    color: var(--text-main);\n    line-height: 1.7;\n    overflow-x: hidden;\n  }\n  img { max-width: 100%; height: auto; display: block; }\n  a { color: var(--green-main); text-decoration: none; transition: color var(--transition); }\n  a:hover { color: var(--green-dark); }\n  ul { list-style: none; }\n  ::selection { background: var(--green-pale); color: var(--green-dark); }\n  ::-webkit-scrollbar { width: 6px; }\n  ::-webkit-scrollbar-track { background: var(--gray-100); }\n  ::-webkit-scrollbar-thumb { background: var(--green-light); border-radius: 3px; }\n\n  /* NAVBAR */\n  #navbar {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;\n    background: rgba(255,255,255,0.97);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid var(--green-pale);\n    box-shadow: 0 2px 16px rgba(46,125,50,0.08);\n    transition: all var(--transition);\n  }\n  .nav-inner {\n    max-width: 1200px; margin: 0 auto;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 0 24px; height: 70px;\n  }\n  .nav-brand {\n    display: flex; align-items: center; gap: 12px;\n    font-weight: 700; font-size: 1.15rem; color: var(--green-dark);\n    letter-spacing: -0.3px;\n  }\n  .nav-logo {\n    width: 42px; height: 42px; border-radius: 50%;\n    background: linear-gradient(135deg, var(--green-light), var(--solar-main));\n    display: flex; align-items: center; justify-content: center;\n    font-size: 1.3rem; flex-shrink: 0;\n    box-shadow: 0 2px 8px rgba(76,175,80,0.3);\n  }\n  .nav-brand-text { display: flex; flex-direction: column; line-height: 1.2; }\n  .nav-brand-text span:first-child { font-size: 0.98rem; }\n  .nav-brand-text span:last-child { font-size: 0.7rem; font-weight: 400; color: var(--gray-600); letter-spacing: 0.5px; }\n  .nav-links { display: flex; align-items: center; gap: 4px; }\n  .nav-links > li { position: relative; }\n  .nav-links > li > a, .nav-links > li > button {\n    padding: 8px 14px; border-radius: 8px;\n    font-size: 0.88rem; font-weight: 500; color: var(--text-body);\n    background: none; border: none; cursor: pointer;\n    display: flex; align-items: center; gap: 4px;\n    transition: all var(--transition);\n    white-space: nowrap;\n  }\n  .nav-links > li > a:hover, .nav-links > li > button:hover { background: var(--green-bg); color: var(--green-dark); }\n  .nav-links > li > a.active { color: var(--green-dark); background: var(--green-pale); }\n  .dropdown { position: relative; }\n  .dropdown-menu {\n    position: absolute; top: calc(100% + 8px); left: 0;\n    background: var(--white); border: 1px solid var(--green-pale);\n    border-radius: var(--radius); box-shadow: var(--shadow-md);\n    min-width: 160px; padding: 6px;\n    opacity: 0; visibility: hidden; transform: translateY(-6px);\n    transition: all var(--transition);\n  }\n  .dropdown:hover .dropdown-menu, .dropdown:focus-within .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }\n  .dropdown-menu a { display: block; padding: 9px 14px; font-size: 0.85rem; color: var(--text-body); border-radius: 8px; transition: all var(--transition); }\n  .dropdown-menu a:hover { background: var(--green-bg); color: var(--green-dark); }\n  .chevron { font-size: 0.7rem; transition: transform var(--transition); }\n  .dropdown:hover .chevron { transform: rotate(180deg); }\n  .nav-toggle { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; }\n  .nav-toggle span { display: block; width: 22px; height: 2px; background: var(--green-dark); border-radius: 2px; transition: all 0.3s; }\n\n  /* HERO */\n  #hero {\n    min-height: 100vh;\n    background: linear-gradient(160deg, var(--white) 0%, var(--green-bg) 50%, var(--solar-pale) 100%);\n    display: flex; align-items: center;\n    position: relative; overflow: hidden;\n    padding-top: 70px;\n  }\n  .hero-bg-pattern { position: absolute; inset: 0; pointer-events: none; opacity: 0.04; background-image: radial-gradient(circle, var(--green-main) 1px, transparent 1px); background-size: 36px 36px; }\n  .hero-sun { position: absolute; top: -120px; right: -120px; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(255,213,79,0.35) 0%, rgba(255,179,0,0.12) 50%, transparent 70%); animation: pulse-sun 4s ease-in-out infinite; }\n  .hero-leaf { position: absolute; bottom: -60px; left: -60px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(76,175,80,0.12) 0%, transparent 70%); }\n  @keyframes pulse-sun { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:0.85} }\n  .hero-content { max-width: 1200px; margin: 0 auto; padding: 80px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; position: relative; z-index: 1; }\n  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--solar-pale); border: 1px solid var(--solar-light); color: var(--solar-dark); padding: 6px 14px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 24px; }\n  .hero-badge::before { content: \"☀️\"; }\n  .hero-h1 { font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 800; line-height: 1.15; color: var(--text-main); margin-bottom: 20px; letter-spacing: -0.5px; }\n  .hero-h1 em { font-style: normal; color: var(--green-main); }\n  .hero-h1 span { color: var(--solar-dark); }\n  .hero-sub { font-size: 1.05rem; color: var(--text-body); margin-bottom: 36px; max-width: 480px; }\n  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }\n  .btn-primary { background: linear-gradient(135deg, var(--green-main), var(--green-light)); color: var(--white); padding: 14px 28px; border-radius: 10px; font-weight: 600; font-size: 0.95rem; box-shadow: 0 4px 16px rgba(76,175,80,0.35); transition: all var(--transition); border: none; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }\n  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(76,175,80,0.45); color: var(--white); }\n  .btn-outline { background: transparent; color: var(--green-main); border: 2px solid var(--green-main); padding: 12px 26px; border-radius: 10px; font-weight: 600; font-size: 0.95rem; transition: all var(-- \n      <li><a href=\"#present\" class=\"nav-link\">Present<\u002Fa><\u002Fli>\n      <li class=\"dropdown\">\n        <button>Process <span class=\"chevron\">▾<\u002Fspan><\u002Fbutton>\n        <div class=\"dropdown-menu\">\n          <a href=\"#process\">Process<\u002Fa>\n          <a href=\"#infographics\">Infographics<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li><a href=\"#sdg\" class=\"nav-link\">SDG Goals<\u002Fa><\u002Fli>\n      <li><a href=\"#team\" class=\"nav-link\">Team<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\" class=\"nav-link\">Contact Us<\u002Fa><\u002Fli>\n    <\u002Ful>\n    <button class=\"nav-toggle\" id=\"navToggle\" aria-label=\"Toggle menu\">\n      <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- Mobile Menu -->\n<div class=\"mobile-menu\" id=\"mobileMenu\">\n  <a href=\"#background\" onclick=\"closeMobileMenu()\">Background<\u002Fa>\n  <a href=\"#present\" onclick=\"closeMobileMenu()\">Present<\u002Fa>\n  <a href=\"#process\" onclick=\"closeMobileMenu()\">Process<\u002Fa>\n  <a href=\"#infographics\" class=\"sub-link\" onclick=\"closeMobileMenu()\">↳ Infographics<\u002Fa>\n  <a href=\"#sdg\" onclick=\"closeMobileMenu()\">SDG Goals<\u002Fa>\n  <a href=\"#team\" onclick=\"closeMobileMenu()\">Team<\u002Fa>\n  <a href=\"#contact\" onclick=\"closeMobileMenu()\">Contact Us<\u002Fa>\n<\u002Fdiv>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg-pattern\"><\u002Fdiv>\n  <div class=\"hero-sun\"><\u002Fdiv>\n  <div class=\"hero-leaf\"><\u002Fdiv>\n  <div class=\"hero-content container\">\n    <div class=\"hero-text\">\n      <div class=\"hero-badge\">Solar-Powered Plastic Pyrolysis Plant<\u002Fdiv>\n      <h1 class=\"hero-h1\">\n        Turning Plastic Waste into<br>\n        <em>Clean Energy<\u002Fem> &amp;<br>\n        <span>Saved Environment<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"hero-sub\">\n        Green Innovotech Solutions Pvt. Ltd. is pioneering a solar-thermal waste plastic pyrolysis system — converting non-biodegradable plastic into fuel, electricity and a cleaner planet. Incubated at IIT Ropar TBIF.\n      <\u002Fp>\n      <div class=\"hero-btns\">\n        <a href=\"#present\" class=\"btn-primary\">Our Solution ↓<\u002Fa>\n        <a href=\"#contact\" class=\"btn-outline\">Get in Touch<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-stats\">\n        <div class=\"stat-card\">\n          <div class=\"stat-num\"><span class=\"count-up\" data-target=\"1100\">0<\u002Fspan> TPD<\u002Fdiv>\n          <div class=\"stat-label\">Waste generated in Ludhiana daily<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\">\n          <div class=\"stat-num\">$<span class=\"count-up\" data-target=\"39\">0<\u002Fspan>T<\u002Fdiv>\n          <div class=\"stat-label\">Global market opportunity<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\">\n          <div class=\"stat-num\"><span class=\"count-up\" data-target=\"79\">0<\u002Fspan>%<\u002Fdiv>\n          <div class=\"stat-label\">Plastic ends in landfills<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-visual\">\n      <div class=\"hero-diagram\">\n        <div class=\"hero-diagram-title\">Solar Pyrolysis System Flow<\u002Fdiv>\n        <div class=\"pyrolysis-flow\">\n          <div class=\"flow-step\">\n            <div class=\"flow-step-icon\">☀️<\u002Fdiv>\n            <div class=\"flow-step-text\">\n              <strong>Solar Concentrator<\u002Fstrong>\n              <span>Captures &amp; focuses solar irradiance<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-arrow\">↓<\u002Fdiv>\n          <div class=\"flow-step\">\n            <div class=\"flow-step-icon\">♨️<\u002Fdiv>\n            <div class=\"flow-step-text\">\n              <strong>Pyrolysis Reactor<\u002Fstrong>\n              <span>Thermal decomposition of plastic<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-arrow\">↓<\u002Fdiv>\n          <div class=\"flow-step\">\n            <div class=\"flow-step-icon\">⚗️<\u002Fdiv>\n            <div class=\"flow-step-text\">\n              <strong>Exo-Energy Capture<\u002Fstrong>\n              <span>Waste heat harvested for power<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-arrow\">↓<\u002Fdiv>\n          <div class=\"flow-step\">\n            <div class=\"flow-step-icon\">⚡<\u002Fdiv>\n            <div class=\"flow-step-text\">\n              <strong>Clean Energy Output<\u002Fstrong>\n              <span>Electricity + Paraffin fuel<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flow-arrow\">↓<\u002Fdiv>\n          <div class=\"flow-step\" style=\"background:var(--green-bg);border-color:var(--green-pale)\">\n            <div class=\"flow-step-icon\">🌍<\u002Fdiv>\n            <div class=\"flow-step-text\">\n              <strong>Zero Landfill<\u002Fstrong>\n              <span>Saved environment &amp; freed land<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BACKGROUND -->\n<section id=\"background\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">The Problem<\u002Fdiv>\n      <h2 class=\"section-title\">We have been generating plastic waste <em>since 1951<\u002Fem><\u002Fh2>\n      <p class=\"section-sub\">An urgent environmental crisis demands an innovative, sustainable solution.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bg-intro-grid\">\n      <div class=\"bg-intro-text reveal\">\n        <h3 class=\"bg-intro-title\">Ludhiana — <span>Mountains of Waste<\u002Fspan><\u002Fh3>\n        <p style=\"font-size:0.92rem;color:var(--text-body);margin-bottom:16px;\">\n          Around 11,00,000 kg — that's the quantity of garbage the city of Ludhiana produces in a single day, the highest among 13 Municipal Corporations in Punjab. Nearly 3,074 tonnes of waste is collected in Punjab every day.\n        <\u002Fp>\n        <div class=\"highlight-box\">\n          <p>Ludhiana Municipal Corporation has not processed a single kg of waste produced in the city for over a year. Legacy waste weighing over <strong>21 lakh Metric Tonnes<\u002Fstrong> lies dumped at the Jamalpur landfill on Tajpur road, spread across 50 acres.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"point-list\">\n          <div class=\"point-item\">\n            <div class=\"point-icon\">⚠️<\u002Fdiv>\n            <p>Legacy waste of 21 lakh MT + 1,100 TPD new waste causing irreversible environmental degradation of water, air and soil.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"point-item\">\n            <div class=\"point-icon\">💸<\u002Fdiv>\n            <p>Punjab Pollution Control Board fined LMC ₹3.80 crore for failure to process legacy waste.<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"point-item\">\n            <div class=\"point-icon\">🌍<\u002Fdiv>\n            <p>If current trends continue, ~12,000 Mt of plastic waste will be in landfills or the environment by 2050.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:0.78rem;color:var(--gray-600);margin-top:16px;\">Source: The Indian Express Investigation — <em>indianexpress.com/cities/ludhiana<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"waste-visual reveal reveal-delay-2\">\n        <div class=\"waste-stat-big\">\n          <div class=\"num\"><span class=\"count-up\" data-target=\"8300\">0<\u002Fspan> Mt<\u002Fdiv>\n          <div class=\"unit\">Virgin plastics ever manufactured<\u002Fdiv>\n          <div class=\"desc\">as of 2015 (global estimate)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"waste-stats-row\">\n          <div class=\"waste-mini-stat red\">\n            <div class=\"mini-num\">79%<\u002Fdiv>\n            <div class=\"mini-label\">Accumulated in landfills / environment<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"waste-mini-stat green\">\n            <div class=\"mini-num\">9%<\u002Fdiv>\n            <div class=\"mini-label\">Recycled globally<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"waste-mini-stat red\">\n            <div class=\"mini-num\">21L MT<\u002Fdiv>\n            <div class=\"mini-label\">Legacy waste at Ludhiana landfill<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"waste-mini-stat green\">\n            <div class=\"mini-num\">1951<\u002Fdiv>\n            <div class=\"mini-label\">Year plastic waste generation began<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"highlight-box\" style=\"margin:0\">\n          <p><strong>The Punjab Pollution Control Board<\u002Fstrong> has slapped a fine of ₹3.80 crore on LMC for failure to process the legacy waste and causing environmental degradation.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRESENT -->\n<section id=\"present\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">Our Innovation<\u002Fdiv>\n      <h2 class=\"section-title\">Solar Powered Plastic <em>Pyrolysis Plant<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"mission-banner reveal\">\n      <h2>Our Mission<\u002Fh2>\n      <p>To upcycle the entire plastic waste generated using Renewable Energy in a non-polluting, Eco-Sustainable way — assimilating plastic waste in an ecologically responsible manner every single day.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"present-grid\">\n      <div class=\"present-card reveal\">\n        <div class=\"card-icon\">🧪<\u002Fdiv>\n        <h3>The Problem with Plastics<\u002Fh3>\n        <p>Plastics have outgrown most man-made materials and are under environmental scrutiny. By 2015, approximately 6,300 Mt of plastic waste had been generated. Around 9% was recycled, 12% incinerated, and 79% accumulated in landfills or the natural environment.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"present-card reveal reveal-delay-1\">\n        <div class=\"card-icon\">🔬<\u002Fdiv>\n        <h3>What is Pyrolysis?<\u002Fh3>\n        <p>A system where non-biodegradable or slow-degradable plastic is assimilated through pyrolysis — converting it into a form which is controllable, storable and reusable. The challenge was to develop a process that consumes no fossil fuel or electricity while being more efficient in terms of input-to-output energy ratio.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"present-card featured reveal\">\n        <div class=\"card-icon\">☀️<\u002Fdiv>\n        <h3>Solar Plastic Pyrolysis — Our Approach<\u002Fh3>\n        <p>Using Solar energy to initiate and propagate the reaction in the reactor for processing plastic garbage, capturing &amp; utilising exo-energy (normally wasted) via a Concave Reflector and heat capturing mechanism. This exo-energy can further be used to generate electricity sustainably.<\u002Fp>\n        <div class=\"solar-advantages\">\n          <div class=\"adv-item\">India receives 4–7 kWh/m² of Solar Irradiance per day (MNRE)<\u002Fdiv>\n          <div class=\"adv-item\">Present PV solar panels produce 150–200 W/h at max 11% efficiency<\u002Fdiv>\n          <div class=\"adv-item\">India has 3,615 hours of sunlight per year — ~9.9 hrs/day (Punjab)<\u002Fdiv>\n          <div class=\"adv-item\">Potential to capture 39.6–69.3 kW/day/m² across the Indian sub-continent<\u002Fdiv>\n          <div class=\"adv-item\">Multiple stacked systems all using the sun's irradiance simultaneously<\u002Fdiv>\n          <div class=\"adv-item\">Zero fossil fuel. Zero electricity input. Self-sustaining energy loop.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"projection-box reveal\">\n        <h3>📊 Market Projection<\u002Fh3>\n        <p style=\"font-size:0.9rem;opacity:0.9;margin-bottom:8px;\">India produces 34,69,782 TPA of plastic waste. Globally, 7.36 billion TPA accumulates — only 30% is recycled. We aim to increase assimilation to the maximum.<\u002Fp>\n        <div class=\"proj-numbers\">\n          <div class=\"proj-num-item\">\n            <div class=\"big\">$39T<\u002Fdiv>\n            <div class=\"label\">Global market potential<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"proj-num-item\">\n            <div class=\"big\">$18.5B<\u002Fdiv>\n            <div class=\"label\">India market opportunity<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"proj-num-item\">\n            <div class=\"big\">70%<\u002Fdiv>\n            <div class=\"label\">Plastic unrecycled globally<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROCESS -->\n<section id=\"process\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">How It Works<\u002Fdiv>\n      <h2 class=\"section-title\">The Waste Plastic <em>Recycling Process<\u002Fem><\u002Fh2>\n      <p class=\"section-sub\">A systematic 7-step pathway from waste collection to clean energy generation and new products.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"process-steps\">\n      <div class=\"process-step reveal\">\n        <div class=\"step-num\">1<\u002Fdiv>\n        <div class=\"step-icon\">🚛<\u002Fdiv>\n        <h3>Collection<\u002Fh3>\n        <p>Plastic waste collected from curbside programs, drop-off centres, and waste collection companies from various urban sources.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-1\">\n        <div class=\"step-num\">2<\u002Fdiv>\n        <div class=\"step-icon\">🔄<\u002Fdiv>\n        <h3>Sorting<\u002Fh3>\n        <p>Sorted by type and colour — PET, HDPE, LDPE etc. Different plastics have different properties and must be processed separately.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-2\">\n        <div class=\"step-num\">3<\u002Fdiv>\n        <div class=\"step-icon\">⚙️<\u002Fdiv>\n        <h3>Shredding<\u002Fh3>\n        <p>Sorted plastic is shredded into small pieces — dramatically increasing surface area for efficient processing and recycling.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-3\">\n        <div class=\"step-num\">4<\u002Fdiv>\n        <div class=\"step-icon\">💧<\u002Fdiv>\n        <h3>Washing<\u002Fh3>\n        <p>Shredded plastic is washed thoroughly to remove dirt and debris, ensuring the output material is clean and safe for use.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal\">\n        <div class=\"step-num\">5<\u002Fdiv>\n        <div class=\"step-icon\">🔥<\u002Fdiv>\n        <h3>Solar Pyrolysis<\u002Fh3>\n        <p>Solar concentrators heat the plastic in an oxygen-free reactor. Thermal decomposition converts it into gas, oil and char.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-1\">\n        <div class=\"step-num\">6<\u002Fdiv>\n        <div class=\"step-icon\">🛢️<\u002Fdiv>\n        <h3>Product Extraction<\u002Fh3>\n        <p>Paraffin (high calorific value fuel), synthetic gas and liquid fuel are extracted — valuable, storable and reusable outputs.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-2\">\n        <div class=\"step-num\">7<\u002Fdiv>\n        <div class=\"step-icon\">⚡<\u002Fdiv>\n        <h3>Energy Generation<\u002Fh3>\n        <p>Exo-energy from the reactor is captured and converted to electricity. Sustainable, reusable, with very long shelf life.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"process-step reveal reveal-delay-3\" style=\"background:var(--green-bg);border-color:var(--green-pale);\">\n        <div class=\"step-num\" style=\"background:var(--green-main);color:white;\">✓<\u002Fdiv>\n        <div class=\"step-icon\">🌿<\u002Fdiv>\n        <h3>Zero Landfill<\u002Fh3>\n        <p>End result: freed landmass, no landfill burden, saved environment and a circular economy that pays for itself.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"process-benefits\">\n      <div class=\"benefit-group reveal\">\n        <h3>✅ Benefits<\u002Fh3>\n        <div class=\"benefit-list\">\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Reduces plastic waste going to landfills — cutting methane emissions<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Conserves natural resources — no new petroleum extraction required<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Reduces ocean and river pollution — protects marine ecosystems<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Generates clean electricity as a by-product of the process<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Creates employment in the recycling and clean-energy sector<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot green\"><\u002Fdiv>Frees up urban land currently buried under legacy waste mountains<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"benefit-group reveal reveal-delay-2\">\n        <h3>⚠️ Challenges Addressed<\u002Fh3>\n        <div class=\"benefit-list\">\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>Difficulty collecting all plastic waste — solved by modular local plants<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>Sorting complexity — addressed through pre-processing sorting line<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>Not all plastics recyclable conventionally — pyrolysis handles mixed waste<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>High energy cost of conventional pyrolysis — eliminated by solar input<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>Public awareness — addressed through partnerships and demonstration plants<\u002Fdiv>\n          <div class=\"benefit-item\"><div class=\"dot orange\"><\u002Fdiv>Fossil fuel dependency — completely removed by solar-thermal design<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INFOGRAPHICS -->\n<section id=\"infographics\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">Visual Overview<\u002Fdiv>\n      <h2 class=\"section-title\">System <em>Infographics<\u002Fem><\u002Fh2>\n      <p class=\"section-sub\">A visual map of how solar energy drives the entire plastic-to-fuel pipeline.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"process-viz reveal\">\n      <div class=\"pviz-header\">\n        <div class=\"pviz-title\">Solar Thermal Waste Plastic Pyrolysis<\u002Fdiv>\n        <div class=\"pviz-subtitle\">Complete system flow — from waste input to clean energy output<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pviz-solar-zone\">\n        <div class=\"pviz-sun\">\n          <div class=\"pviz-sun-ring pviz-ring-1\"><\u002Fdiv>\n          <div class=\"pviz-sun-ring pviz-ring-2\"><\u002Fdiv>\n          <div class=\"pviz-sun-ring pviz-ring-3\"><\u002Fdiv>\n          <div class=\"pviz-sun-emoji\">☀️<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-solar-label\">Solar Irradiance · <span>4–7 kWh/m²/day<\u002Fspan> · Punjab 9.9 hrs/day<\u002Fdiv>\n        <div class=\"pviz-beam\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pviz-flow\">\n        <div class=\"pviz-node\">\n          <div class=\"pviz-node-inner\">\n            <div class=\"pviz-node-icon\">♻️<\u002Fdiv>\n            <div class=\"pviz-node-name\">Plastic Waste<\u002Fdiv>\n            <div class=\"pviz-node-detail\">Mixed non-biodegradable input<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-arrow\">\n          <div class=\"pviz-arrow-track\"><div class=\"pviz-arrow-fill\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"pviz-arrow-head\">›<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pviz-node\">\n          <div class=\"pviz-node-inner\">\n            <div class=\"pviz-node-icon\">⚙️<\u002Fdiv>\n            <div class=\"pviz-node-name\">Sort &amp; Shred<\u002Fdiv>\n            <div class=\"pviz-node-detail\">By type: PET, HDPE, LDPE<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-arrow\">\n          <div class=\"pviz-arrow-track\"><div class=\"pviz-arrow-fill\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"pviz-arrow-head\">›<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pviz-node pviz-node-reactor\">\n          <div class=\"pviz-node-inner\">\n            <div class=\"pviz-node-icon\">🔥<\u002Fdiv>\n            <div class=\"pviz-node-name\">Solar Reactor<\u002Fdiv>\n            <div class=\"pviz-node-detail\">Pyrolysis 300–600°C<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"pviz-particles\">\n            <span class=\"pviz-particle\"><\u002Fspan>\n            <span class=\"pviz-particle\"><\u002Fspan>\n            <span class=\"pviz-particle\"><\u002Fspan>\n            <span class=\"pviz-particle\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-arrow\">\n          <div class=\"pviz-arrow-track\"><div class=\"pviz-arrow-fill\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"pviz-arrow-head\">›<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pviz-node\">\n          <div class=\"pviz-node-inner\">\n            <div class=\"pviz-node-icon\">⚗️<\u002Fdiv>\n            <div class=\"pviz-node-name\">Condenser<\u002Fdiv>\n            <div class=\"pviz-node-detail\">Exo-energy capture<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-arrow\">\n          <div class=\"pviz-arrow-track\"><div class=\"pviz-arrow-fill\"><\u002Fdiv><\u002Fdiv>\n          <span class=\"pviz-arrow-head\">›<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"pviz-node\">\n          <div class=\"pviz-node-inner\">\n            <div class=\"pviz-node-icon\">🔀<\u002Fdiv>\n            <div class=\"pviz-node-name\">Distribution<\u002Fdiv>\n            <div class=\"pviz-node-detail\">Separate &amp; store products<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pviz-connectors\">\n        <div class=\"pviz-vconn\"><\u002Fdiv>\n        <div class=\"pviz-vconn\"><\u002Fdiv>\n        <div class=\"pviz-vconn\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pviz-outputs\">\n        <div class=\"pviz-output pviz-out-fuel\">\n          <div class=\"pviz-out-icon\">🛢️<\u002Fdiv>\n          <div class=\"pviz-out-title\">Paraffin Fuel<\u002Fdiv>\n          <div class=\"pviz-out-kv\"><span>High Calorific Value<\u002Fspan><\u002Fdiv>\n          <div class=\"pviz-out-desc\">Controllable, storable, reusable substitute for conventional fuels<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-output pviz-out-power\">\n          <div class=\"pviz-out-icon\">⚡<\u002Fdiv>\n          <div class=\"pviz-out-title\">Clean Electricity<\u002Fdiv>\n          <div class=\"pviz-out-kv\"><span>Zero Emissions<\u002Fspan><\u002Fdiv>\n          <div class=\"pviz-out-desc\">Generated from captured exo-energy with very long shelf life<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-output pviz-out-earth\">\n          <div class=\"pviz-out-icon\">🌿<\u002Fdiv>\n          <div class=\"pviz-out-title\">Zero Landfill<\u002Fdiv>\n          <div class=\"pviz-out-kv\"><span>100% Assimilation<\u002Fspan><\u002Fdiv>\n          <div class=\"pviz-out-desc\">Freed land, restored ecosystems, clean urban environments<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pviz-stats\">\n        <div class=\"pviz-stat\">\n          <div class=\"pviz-stat-val\">0<\u002Fdiv>\n          <div class=\"pviz-stat-label\">Fossil fuel input<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-stat\">\n          <div class=\"pviz-stat-val\">300–600°C<\u002Fdiv>\n          <div class=\"pviz-stat-label\">Reactor temperature<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-stat\">\n          <div class=\"pviz-stat-val\">9.9 hrs<\u002Fdiv>\n          <div class=\"pviz-stat-label\">Daily solar input (Punjab)<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pviz-stat\">\n          <div class=\"pviz-stat-val\">100%<\u002Fdiv>\n          <div class=\"pviz-stat-label\">Waste assimilation target<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SDG -->\n<section id=\"sdg\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">UN Goals<\u002Fdiv>\n      <h2 class=\"section-title\">Sustainable Development <em>Goals We Target<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"sdg-intro reveal\">\n      The initiative of <strong>\"Solar thermal powered waste plastic pyrolysis\"<\u002Fstrong> contributes to several Sustainable Development Goals (SDGs) outlined by the United Nations — addressing critical environmental, social, and economic challenges through innovative, technology-driven solutions.\n    <\u002Fdiv>\n    <div class=\"sdg-grid\">\n      <div class=\"sdg-card sdg-7 reveal\">\n        <div class=\"sdg-icon\"><img src=\"22a69320-f94a-416e-a03a-cee24321be94\" alt=\"SDG 7\"><\u002Fdiv>\n        <h3>Affordable &amp; Clean Energy<\u002Fh3>\n        <p>Utilizing solar thermal energy promotes renewable energy sources, contributing to clean and sustainable energy solutions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-9 reveal reveal-delay-1\">\n        <div class=\"sdg-icon\"><img src=\"ed09e08b-3b48-4bb6-b2e8-f621732ce82c\" alt=\"SDG 9\"><\u002Fdiv>\n        <h3>Industry, Innovation &amp; Infrastructure<\u002Fh3>\n        <p>Combining solar thermal technology with pyrolysis represents an innovative approach advancing sustainable infrastructure.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-11 reveal reveal-delay-2\">\n        <div class=\"sdg-icon\"><img src=\"52ec0a8f-8331-4262-a79d-6cf4a22be58a\" alt=\"SDG 11\"><\u002Fdiv>\n        <h3>Sustainable Cities &amp; Communities<\u002Fh3>\n        <p>Efficient plastic waste management creates cleaner urban environments and promotes sustainable waste management practices.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-12 reveal reveal-delay-3\">\n        <div class=\"sdg-icon\"><img src=\"f3c02f20-329b-4898-bf7d-ff18ff0c92eb\" alt=\"SDG 12\"><\u002Fdiv>\n        <h3>Responsible Consumption &amp; Production<\u002Fh3>\n        <p>Converting waste plastic into valuable products supports responsible consumption and reduces demand for virgin plastic.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-13 reveal\">\n        <div class=\"sdg-icon\"><img src=\"63dd5522-3785-4a19-a13a-36e9c5b669c7\" alt=\"SDG 13\"><\u002Fdiv>\n        <h3>Climate Action<\u002Fh3>\n        <p>Reduces greenhouse gas emissions from traditional plastic disposal. Solar energy further mitigates the carbon footprint.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-14 reveal reveal-delay-1\">\n        <div class=\"sdg-icon\"><img src=\"ed2a57b7-a7ad-45d4-b616-de8b5325fa80\" alt=\"SDG 14\"><\u002Fdiv>\n        <h3>Life Below Water<\u002Fh3>\n        <p>Preventing plastic from entering water bodies protects marine life and supports conservation of ocean ecosystems.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-15 reveal reveal-delay-2\">\n        <div class=\"sdg-icon\"><img src=\"a042531d-1fa6-40b4-9daf-f864f84f284e\" alt=\"SDG 15\"><\u002Fdiv>\n        <h3>Life on Land<\u002Fh3>\n        <p>Effective waste management preserves terrestrial ecosystems and reduces land pollution from improper plastic disposal.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"sdg-card sdg-17 reveal reveal-delay-3\">\n        <div class=\"sdg-icon\"><img src=\"01f02739-ec9f-4bd0-90aa-c08c6478129b\" alt=\"SDG 17\"><\u002Fdiv>\n        <h3>Partnerships for the Goals<\u002Fh3>\n        <p>Public-private partnerships, research institutions, and communities are crucial for knowledge-sharing and sustainable implementation.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TEAM -->\n<section id=\"team\">\n  <div class=\"container\">\n    <div class=\"section-header reveal\">\n      <div class=\"section-tag\">Our People<\u002Fdiv>\n      <h2 class=\"section-title\">The <em>Team<\u002Fem> Behind the Vision<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"team-intro reveal\">\n      We are working towards Sustainability in the fields of Waste Management and Green Energy through <strong>Green Innovotech Solutions Pvt. Ltd.<\u002Fstrong> at Ludhiana — an industrial town of Punjab, known for Hero Cycles, Oswal &amp; Vardhman Groups, Avon Cycles, and recognised as the <em>Manchester of India<\u002Fem>.\n    <\u002Fdiv>\n    <div class=\"team-grid\">\n      <div class=\"team-card reveal\">\n        <div class=\"team-avatar\" id=\"kul-avatar\" style=\"overflow:hidden;padding:0;\">\n          🧑‍💼\n        <\u002Fdiv>\n        <div class=\"team-role\">Co-Founder<\u002Fdiv>\n        <h3>Kuldeep Singh<\u002Fh3>\n        <p>A seasoned small business entrepreneur with over 20 years of sales and management experience, presently running a Two-wheelers Auto Parts Trading and Manufacturing Micro-enterprise in Ludhiana, Punjab.<\u002Fp>\n        <p style=\"margin-top:12px;font-size:0.83rem;color:var(--gray-600);\">📞 +91 9815 00 2787<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"team-  Color&quot;, &quot;options&quot;: [&quot;#E65100&quot;, &quot;#F57F17&quot;, &quot;#BF360C&quot;, &quot;#FF6F00&quot;]}\n}\">\nclass Component extends DCLogic {\n  state = { kuldeepSrc: '', harjitSrc: '' };\n\n  componentDidMount() {\n    // Load from global window.PHOTO_DATA (injected by photos.js) and inject into DOM\n    if (window.PHOTO_DATA) {\n      const kulAv = document.getElementById('kul-avatar');\n      const harAv = document.getElementById('har-avatar');\n      if (kulAv && window.PHOTO_DATA.kuldeep) {\n        kulAv.innerHTML = `<img src=\"${window.PHOTO_DATA.kuldeep}\" style=\"width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;\" alt=\"Kuldeep Singh\">`;\n      }\n      if (harAv && window.PHOTO_DATA.harjit) {\n        harAv.innerHTML = `<img src=\"${window.PHOTO_DATA.harjit}\" style=\"width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;\" alt=\"Harjit Singh\">`;\n      }\n      // Logo from letterhead\n      const navLogo = document.getElementById('nav-logo');\n      if (navLogo && window.PHOTO_DATA.logoIcon) {\n        navLogo.style.background = '#ffffff';\n        navLogo.style.boxShadow = '0 2px 8px rgba(76,175,80,0.25)';\n        navLogo.innerHTML = `<img src=\"${window.PHOTO_DATA.logoIcon}\" style=\"width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;\" alt=\"Green Innovotech logo\">`;\n      }\n      const footLogo = document.getElementById('footer-logo');\n      if (footLogo && window.PHOTO_DATA.logoIcon) {\n        footLogo.innerHTML = `<img src=\"${window.PHOTO_DATA.logoIcon}\" style=\"width:34px;height:34px;object-fit:cover;border-radius:50%;display:block;\" alt=\"Green Innovotech logo\">`;\n      }\n    }\n\n    // Nav scroll behavior\n    const navbar = document.getElementById('navbar');\n    const backTop = document.getElementById('back-top');\n    window.addEventListener('scroll', () => {\n      navbar.style.boxShadow = window.scrollY > 60\n        ? '0 4px 24px rgba(46,125,50,0.14)'\n        : '0 2px 16px rgba(46,125,50,0.08)';\n      backTop && (window.scrollY > 400 ? backTop.classList.add('visible') : backTop.classList.remove('visible'));\n      this.updateActiveNav();\n    });\n\n    // Mobile menu\n    const navToggle = document.getElementById('navToggle');\n    const mobileMenu = document.getElementById('mobileMenu');\n    if (navToggle) {\n      navToggle.addEventListener('click', () => {\n        mobileMenu.classList.toggle('open');\n        const spans = navToggle.querySelectorAll('span');\n        if (mobileMenu.classList.contains('open')) {\n          spans[0].style.transform = 'rotate(45deg) translate(5px,5px)';\n          spans[1].style.opacity = '0';\n          spans[2].style.transform = 'rotate(-45deg) translate(5px,-5px)';\n        } else {\n          spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });\n        }\n      });\n    }\n\n    // Scroll reveal\n    const reveals = document.querySelectorAll('.reveal');\n    const revealObs = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });\n    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n    reveals.forEach(el => revealObs.observe(el));\n\n    // Counter animation\n    const counterObs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          const target = parseInt(e.target.getAttribute('data-target'));\n          this.animateCount(e.target, target);\n          counterObs.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.5 });\n    document.querySelectorAll('.count-up').forEach(el => counterObs.observe(el));\n\n    // Smooth anchor scroll\n    document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n      a.addEventListener('click', function(e) {\n        const target = document.querySelector(this.getAttribute('href'));\n        if (target) {\n          e.preventDefault();\n          const top = target.getBoundingClientRect().top + window.scrollY - 78;\n          window.scrollTo({ top, behavior: 'smooth' });\n        }\n      });\n    });\n\n    // Contact form\n    const form = document.getElementById('contactForm');\n    if (form) form.addEventListener('submit', (e) => {\n      e.preventDefault();\n      const btn = e.target.querySelector('.btn-submit');\n      btn.textContent = 'Sending...';\n      btn.style.opacity = '0.7';\n      setTimeout(() => {\n        e.target.style.display = 'none';\n        document.getElementById('formSuccess').style.display = 'block';\n      }, 1200);\n    });\n  }\n\n  updateActiveNav() {\n    const sections = ['background','present','process','infographics','sdg','team','contact'];\n    let current = '';\n    sections.forEach(id => {\n      const el = document.getElementById(id);\n      if (el && window.scrollY >= el.offsetTop - 100) current = id;\n    });\n    document.querySelectorAll('.nav-link').forEach(a => {\n      a.classList.remove('active');\n      if (a.getAttribute('href') === '#' + current) a.classList.add('active');\n    });\n  }\n\n  animateCount(el, target, duration = 1600) {\n    let start = 0;\n    const step = target / (duration / 16);\n    const timer = setInterval(() => {\n      start += step;\n      if (start >= target) { el.textContent = target.toLocaleString(); clearInterval(timer); }\n      else { el.textContent = Math.floor(start).toLocaleString(); }\n    }, 16);\n  }\n\n  renderVals() {\n    const kp = this.props.kuldeepPhoto || this.state.kuldeepSrc;\n    const hp = this.props.harjitPhoto || this.state.harjitSrc;\n    return {\n      kuldeepPhoto: kp,\n      harjitPhoto: hp,\n      hasKuldeepPhoto: !!kp,\n      hasHarjitPhoto: !!hp,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
